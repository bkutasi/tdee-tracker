name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]

# Permissions for Cloudflare Pages deployment
permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  # Job 1: Lint code (blocks deployment if fails)
  lint:
    name: ESLint Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install ESLint
        run: npm install -g eslint@latest @eslint/js@latest globals@latest

      - name: Run ESLint
        run: npx eslint js/
        env:
          CI: true

  # Job 2: Check version consistency (blocks deployment if mismatch)
  version-check:
    name: Version Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify version consistency
        run: node scripts/check-versions.js
        env:
          CI: true

  # Job 3: Run tests (blocks deployment if fails)
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint  # Waits for lint job to complete
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run test suite
        run: node tests/node-test.js
        env:
          CI: true

      - name: Check test coverage
        run: npm run coverage
        env:
          CI: true

      - name: Upload test results (if failed)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: tests/results/
          retention-days: 7

  # Job 4: Run E2E tests with Playwright
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: test  # Waits for unit tests to complete
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate test config for E2E
        run: |
          cat > js/config.js << 'EOF'
          'use strict';
          window.SUPABASE_CONFIG = {
              url: 'https://test-placeholder.supabase.co',
              anonKey: 'test-placeholder-key-for-e2e-testing-only',
              siteUrl: 'http://localhost:8765'
          };
          if (typeof module !== 'undefined' && module.exports) {
              module.exports = window.SUPABASE_CONFIG;
          }
          EOF

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report (if failed)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Deploy to Cloudflare Pages (only if lint, tests, and e2e pass)
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: [lint, test, e2e, version-check]
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate config from secrets
        run: node scripts/generate-config.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}

      - name: Validate generated config
        run: node tests/config-validation.test.js

      - name: Deploy to Cloudflare Pages (Production)
        if: github.ref == 'refs/heads/master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=tdee-tracker --commit-dirty=true

      - name: Deploy to Cloudflare Pages (Preview)
        if: github.ref != 'refs/heads/master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=tdee-tracker --branch=${{ github.ref_name }} --commit-dirty=true

      - name: Output deployment URL
        run: |
          if [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "✅ Production deployment complete!"
            echo "🌐 URL: https://tdee.kutasi.dev"
          else
            echo "✅ Preview deployment complete!"
            echo "🌐 Preview URL will be available at:"
            echo "   https://${{ github.sha }}.tdee-tracker.pages.dev"
          fi
